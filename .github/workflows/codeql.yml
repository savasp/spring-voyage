name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # No paths-ignore here on purpose: branch protection has a 'Require code
    # scanning results' rule that waits for a CodeQL SARIF upload for each PR
    # head commit. If paths-ignore prevents this workflow from running on a
    # docs-only PR, no SARIF ever gets uploaded and the PR blocks forever
    # (see #191 - NOTICE.md-only PR that couldn't merge). With build-mode none
    # running CodeQL on a doc-only PR is cheap (~2 min on the db reuse path)
    # so paying that cost beats the merge deadlock.
  merge_group:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
