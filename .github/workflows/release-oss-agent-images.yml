name: Release OSS agent images

# #1536. Publishes the four OSS role agent images on tag push:
#   - ghcr.io/cvoya-com/spring-voyage-agent-oss-software-engineering:<semver>
#   - ghcr.io/cvoya-com/spring-voyage-agent-oss-design:<semver>
#   - ghcr.io/cvoya-com/spring-voyage-agent-oss-product-management:<semver>
#   - ghcr.io/cvoya-com/spring-voyage-agent-oss-program-management:<semver>
#   (plus :latest variants for each)
#
# Tag shape: `oss-agents-vX.Y.Z`. Scoped prefix keeps this workflow separate
# from `release-spring-voyage-agents.yml` (prefix: `agents-v*`) and
# `release-agent-base.yml` (prefix: `agent-base-v*`).
#
# Each OSS image FROMs spring-voyage-agents:latest (the omnibus; published
# by release-spring-voyage-agents.yml). Publish the omnibus first if both
# need updating in the same release; this workflow pulls the already-published
# omnibus from GHCR rather than rebuilding it.
#
# The four images build in parallel via a strategy matrix.
#
# Untrusted inputs are routed through env vars and validated by regex in
# the resolve job before any downstream step touches them. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    tags:
      - "oss-agents-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. oss-agents-v1.0.0). Required for manual runs."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  resolve:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - name: Resolve release tag and version
        id: r
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$REF_NAME"
          fi
          if [[ -z "$release_tag" ]]; then
            echo "::error::could not resolve a release tag"; exit 1
          fi
          if ! [[ "$release_tag" =~ ^oss-agents-v([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?)$ ]]; then
            echo "::error::tag '$release_tag' does not match oss-agents-vX.Y.Z[-prerelease]"
            exit 1
          fi
          release_version="${BASH_REMATCH[1]}"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"

  build-and-publish:
    name: Build and push ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: resolve
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: spring-voyage-agent-oss-software-engineering
            dockerfile: deployment/Dockerfile.agent.oss-software-engineering
          - name: spring-voyage-agent-oss-design
            dockerfile: deployment/Dockerfile.agent.oss-design
          - name: spring-voyage-agent-oss-product-management
            dockerfile: deployment/Dockerfile.agent.oss-product-management
          - name: spring-voyage-agent-oss-program-management
            dockerfile: deployment/Dockerfile.agent.oss-program-management
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: cvoya-com/${{ matrix.name }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.description=Spring Voyage OSS role agent image — ${{ matrix.name }} (#1536).
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AGENT_BASE_IMAGE=ghcr.io/cvoya-com/spring-voyage-agents:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_NAME: ${{ matrix.name }}
        run: |
          gh api -X PATCH "/orgs/cvoya-com/packages/container/${PKG_NAME}" \
            -F visibility=public

      - name: Summary
        shell: bash
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}
        run: |
          echo "::notice::published ${IMAGE_REF}"
