name: Release spring-agent image

# Builds the spring-agent container image (Claude Code runtime, #390) and
# publishes it to the GitHub Container Registry whenever a release tag is
# pushed. The Dockerfile is baked with a pinned Claude Code CLI version - we
# surface that version as an additional tag so operators can pull either the
# semver release tag or the CLI version baked into the image.
#
# Scope: multi-arch (linux/amd64 + linux/arm64) so the image works on both
# x86_64 servers and Apple-silicon developer laptops. Acceptance for #509.

on:
  push:
    # Match v-prefixed semver-ish tags. This workflow is scoped to release
    # tags only - every other event (pushes, PRs, merge groups) is handled by
    # ci.yml, which does not build container images.
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Required for manual runs."
        required: true
        type: string

concurrency:
  # One publish per ref. Manual dispatches and tag pushes can't fight over the
  # same registry tag.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Required by docker/login-action to mint a short-lived registry token from
  # GITHUB_TOKEN so we can push to ghcr.io without a PAT.
  packages: write

jobs:
  publish:
    name: Build and push spring-agent
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: cvoya-com/spring-agent
      DOCKERFILE_PATH: packages/software-engineering/execution/spring-agent/Dockerfile

    steps:
      - uses: actions/checkout@v6

      # Derive the release tag. For a tag push ${{ github.ref_name }} is the
      # bare tag (e.g. "v0.1.0"). For a manual workflow_dispatch the operator
      # supplies the tag explicitly so we can republish from a previously-cut
      # release without having to retag the git ref.
      #
      # Untrusted inputs (github.ref_name / inputs.tag) are routed through env
      # vars rather than inlined into the shell to avoid command injection.
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$REF_NAME"
          fi
          if [[ -z "$release_tag" ]]; then
            echo "::error::could not resolve a release tag"
            exit 1
          fi
          # Reject anything that isn't a simple tag-shaped string so a crafted
          # ref can't inject shell metachars into downstream steps that consume
          # this output.
          if ! [[ "$release_tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::release tag '$release_tag' contains unsupported characters"
            exit 1
          fi
          # Strip a leading 'v' for the semver-style version label so
          # ghcr.io/.../spring-agent:0.1.0 sits next to :v0.1.0.
          release_version="${release_tag#v}"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"

      # Parse the Claude Code CLI version baked into the Dockerfile so we can
      # tag the image with it. #509's acceptance asks that operators be able
      # to pull either the release tag or the CLI version; this keeps the
      # Dockerfile as the single source of truth for the pinned version.
      - name: Extract baked Claude Code version
        id: claude
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep -E '^ARG CLAUDE_CODE_VERSION=' "$DOCKERFILE_PATH" | head -n1 | cut -d= -f2 | tr -d '"')"
          if [[ -z "$version" ]]; then
            echo "::error file=$DOCKERFILE_PATH::could not extract CLAUDE_CODE_VERSION ARG"
            exit 1
          fi
          if ! [[ "$version" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::extracted CLAUDE_CODE_VERSION '$version' contains unsupported characters"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for cross-arch emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN is minted per job with the 'packages: write' scope
      # declared above - no PAT or long-lived secret in play. The token's
      # identity is github-actions[bot], which GHCR accepts for pushes to
      # packages owned by the repository org.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Emit four tags:
          #   - the raw git tag (e.g. v0.1.0)
          #   - the semver triple (e.g. 0.1.0)
          #   - claude-<baked-version> so operators can pin on CLI rev
          #   - latest - rolls forward to every published release
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=claude-${{ steps.claude.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=spring-agent
            org.opencontainers.image.description=Spring Voyage agent runtime with pinned Claude Code CLI
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}
            com.cvoya.spring-agent.claude-code-version=${{ steps.claude.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass the baked CLI version through as a build-arg too. The
          # Dockerfile already pins a default, but re-passing it here means a
          # single edit to the Dockerfile's ARG is the one place to change
          # the published version - no hidden drift between workflow input
          # and image contents.
          build-args: |
            CLAUDE_CODE_VERSION=${{ steps.claude.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        shell: bash
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          CLAUDE_VERSION: ${{ steps.claude.outputs.version }}
        run: |
          {
            echo "### Published spring-agent image"
            echo
            echo "- Registry: \`${REGISTRY}/${IMAGE_NAME}\`"
            echo "- Git tag: \`${RELEASE_TAG}\`"
            echo "- Claude Code CLI version: \`${CLAUDE_VERSION}\`"
            echo
            echo "Tags pushed:"
            echo
            echo '```'
            echo "${META_TAGS}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
