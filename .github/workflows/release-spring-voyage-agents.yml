name: Release spring-voyage-agents

# #1514. Publishes the omnibus agent image on tag push:
#   - ghcr.io/cvoya-com/spring-voyage-agents:<semver>  (OCI image, multi-arch)
#   - ghcr.io/cvoya-com/spring-voyage-agents:latest
#
# Tag shape: `agents-vX.Y.Z`. Scoped prefix keeps this workflow separate from
# `release-agent-base.yml` (prefix: `agent-base-v*`) and
# `release-spring-agent-image.yml` (prefix: `v*`).
#
# The omnibus image FROMs spring-voyage-agent-base:latest (published by
# release-agent-base.yml). Publish agent-base first if both need to be
# updated in the same release; this workflow pulls the already-published
# base image from GHCR rather than rebuilding it.
#
# Untrusted inputs are routed through env vars and validated by regex in
# the resolve job before any downstream step touches them. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    tags:
      - "agents-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. agents-v1.0.0). Required for manual runs."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  resolve:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - name: Resolve release tag and version
        id: r
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$REF_NAME"
          fi
          if [[ -z "$release_tag" ]]; then
            echo "::error::could not resolve a release tag"; exit 1
          fi
          if ! [[ "$release_tag" =~ ^agents-v([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?)$ ]]; then
            echo "::error::tag '$release_tag' does not match agents-vX.Y.Z[-prerelease]"
            exit 1
          fi
          release_version="${BASH_REMATCH[1]}"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"

  publish-image:
    name: Build and push spring-voyage-agents OCI image
    runs-on: ubuntu-latest
    needs: resolve
    timeout-minutes: 45
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: cvoya-com/spring-voyage-agents
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=spring-voyage-agents
            org.opencontainers.image.description=Spring Voyage omnibus agent image: Claude Code, OpenAI Codex, and Google Gemini CLIs plus the dapr-agent Python stack — the platform default for unit creation (#1514).
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile.spring-voyage-agents
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AGENT_BASE_IMAGE=ghcr.io/cvoya-com/spring-voyage-agent-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
