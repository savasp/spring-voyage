# Local development state store.
#
# Redis on localhost:6379 (e.g. the container that `dapr init` bundles). Used
# by the Dapr actor runtime for actor state and by `DaprStateStore` for general
# key/value state (see `DaprStateStoreOptions.StoreName`).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "localhost:6379"
    - name: redisPassword
      value: ""
    - name: actorStateStore
      value: "true"
