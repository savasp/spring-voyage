# Local development pub/sub.
#
# Redis Streams on localhost:6379. Topic names are defined by the publishers
# (see `StreamEventPublisher`, `CancellationManager`).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: "localhost:6379"
    - name: redisPassword
      value: ""
