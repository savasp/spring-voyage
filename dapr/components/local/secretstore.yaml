# Local development secret store.
#
# Reads secrets from the local process environment. Matches the production
# profile so component `secretKeyRef` entries resolve identically in both
# environments — set `POSTGRES_PASSWORD`, `REDIS_PASSWORD`, etc. in the shell
# that invokes `dapr run` (or in `.env` loaded by your editor).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore
spec:
  type: secretstores.local.env
  version: v1
