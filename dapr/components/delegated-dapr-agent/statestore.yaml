# Redis state for delegated Dapr Python agents (DurableAgent + workflow).
# Uses the platform Redis on spring-net, reachable after deploy.sh
# dual-attaches spring-redis to the tenant bridge (ADR 0028 V2 interim).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "spring-redis:6379"
    - name: redisPassword
      value: ""
    - name: actorStateStore
      value: "true"
