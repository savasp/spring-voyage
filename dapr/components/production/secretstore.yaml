# Production secret store — local environment variables.
#
# Dapr's `secretstores.local.env` store reads secrets directly from the
# process environment. The platform deployment (`deployment/deploy.sh`) runs
# each Dapr sidecar with `--env-file deployment/spring.env`, so every
# `secretKeyRef` in a sibling component resolves against the variables
# defined there. See `deployment/spring.env.example` for the full catalogue
# of supported variables.
#
# For production-grade secret management (Azure Key Vault, HashiCorp Vault,
# AWS Secrets Manager, Kubernetes Secrets, etc.), replace this component
# with the corresponding Dapr secret store — the rest of the profile only
# depends on the component being named `secretstore`.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore
spec:
  type: secretstores.local.env
  version: v1
