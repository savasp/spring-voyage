apiVersion: spring.voyage/v1
kind: UnitPackage
metadata:
  name: software-engineering
  description: A software engineering team — tech lead, backend engineer, and QA — wired up with triage / PR-review skills and a GitHub connector.

inputs:
  - name: github_owner
    type: string
    required: true
    description: GitHub owner (org or user) that owns the repository this team operates on.
  - name: github_repo
    type: string
    required: true
    description: GitHub repository name this team operates on.
  - name: github_installation_id
    type: string
    required: true
    description: GitHub App installation ID for the Spring Voyage App on the target repository.

unit: engineering-team
